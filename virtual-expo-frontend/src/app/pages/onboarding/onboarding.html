<div class="onboarding-container">
  <div class="onboarding-card">
    <h2>Complete Your Profile</h2>
    <p>Please provide your official placement details.</p>

    <form (ngSubmit)="submitProfile()" #profileForm="ngForm">
      
      <div class="form-group full-width">
        <label>Official College Email (@imsnoida.com)</label>
        <input type="email" [(ngModel)]="formData.email" name="email" required 
               placeholder="e.g., student@imsnoida.com">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" [(ngModel)]="formData.rollNumber" name="rollNumber" required>
        </div>
        <div class="form-group">
          <label>Course</label>
          <select [(ngModel)]="formData.course" name="course">
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>
            <option value="MCA">MCA</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Semester</label>
          <input type="number" [(ngModel)]="formData.semester" name="semester" min="1" max="8" required>
        </div>
        <div class="form-group">
          <label>Section</label>
          <input type="text" [(ngModel)]="formData.section" name="section" required>
        </div>
      </div>

      <div class="form-group full-width">
        <label>Technical Skills (Comma separated)</label>
        <input type="text" [(ngModel)]="formData.skills" name="skills" 
               placeholder="e.g., Java, React, SQL, Docker">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Preferred Programming Language</label>
          <input type="text" [(ngModel)]="formData.preferredLanguage" name="preferredLanguage">
        </div>
        <div class="form-group">
          <label>Target IT Domain</label>
          <input type="text" [(ngModel)]="formData.targetItDomain" name="targetItDomain" 
                 placeholder="e.g., Full Stack, Data Science">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Dream Job Profile</label>
          <input type="text" [(ngModel)]="formData.dreamJobProfile" name="dreamJobProfile" 
                 placeholder="e.g., Software Engineer, Data Analyst">
        </div>
        <div class="form-group">
          <label>Target Industry</label>
          <input type="text" [(ngModel)]="formData.industry" name="industry" 
                 placeholder="e.g., FinTech, EdTech, E-commerce">
        </div>
      </div>

      <div class="form-group full-width">
        <label>Top 5 Target Companies (Comma separated)</label>
        <input type="text" [(ngModel)]="formData.targetCompanies" name="targetCompanies" 
               placeholder="e.g., Google, Microsoft, TCS, Infosys, Amazon">
      </div>

      <div class="form-group full-width">
        <label>LinkedIn Profile URL</label>
        <input type="url" [(ngModel)]="formData.linkedinUrl" name="linkedinUrl" 
               placeholder="https://linkedin.com/in/yourprofile">
      </div>

      <button type="submit" class="submit-btn" [disabled]="!profileForm.form.valid">Submit Profile</button>
    </form>
  </div>
</div>
