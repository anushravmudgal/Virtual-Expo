spring.application.name=virtual-expo
# Server Configuration
server.port=8088

# Database Connection (Pointing to the Dockerized MySQL on port 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/virtual_expo_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=expo_root_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Settings (Validates your Entities against the Schema we already created)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true